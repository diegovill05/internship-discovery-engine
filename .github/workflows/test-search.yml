name: Test Internship Search

on:
  workflow_dispatch:
    inputs:
      track:
        description: "Career track to search"
        required: false
        default: "cyber"
        type: choice
        options:
          - all
          - cyber
          - swe
          - data
          - it
      max_results:
        description: "Maximum number of search results"
        required: false
        default: "25"
        type: string
      export:
        description: "Export format"
        required: false
        default: "sheets"
        type: choice
        options:
          - sheets
          - none
      sheet_tab:
        description: "Google Sheet tab name"
        required: false
        default: "Sheet1"
        type: string

jobs:
  test-search:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run internship search
        env:
          IE_BRAVE_API_KEY: ${{ secrets.IE_BRAVE_API_KEY }}
          IE_SHEET_ID: ${{ secrets.IE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          internship-engine run \
            --source brave \
            --export "${{ inputs.export }}" \
            --sheet-tab "${{ inputs.sheet_tab }}" \
            --track "${{ inputs.track }}" \
            --max-results "${{ inputs.max_results }}"
